name: Compilar app offline (Windows)

# Genera el ejecutable .exe de la versión de escritorio (offline) y lo publica
# en la sección "Releases" del repositorio, con un enlace público de descarga.
#
# Se puede lanzar:
#   - Manualmente:  pestaña "Actions" -> este workflow -> "Run workflow".
#   - Con una etiqueta:  al hacer push de un tag que empiece por "v" (ej. v1.0.0).

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Nombre de la versión para la Release"
        default: "offline-latest"
        required: true
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias de Python
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pytesseract pillow pandas openpyxl matplotlib

      - name: Instalar Tesseract OCR
        run: choco install --no-progress -y tesseract

      - name: Preparar Tesseract para empaquetar (idioma español + inglés)
        shell: pwsh
        run: |
          $src = "C:\Program Files\Tesseract-OCR"
          if (-Not (Test-Path $src)) { $src = "C:\Program Files (x86)\Tesseract-OCR" }
          Copy-Item $src -Destination "tesseract" -Recurse
          $tessdata = "tesseract\tessdata"
          Invoke-WebRequest -UseBasicParsing `
            -Uri "https://github.com/tesseract-ocr/tessdata_fast/raw/main/spa.traineddata" `
            -OutFile "$tessdata\spa.traineddata"
          Invoke-WebRequest -UseBasicParsing `
            -Uri "https://github.com/tesseract-ocr/tessdata_fast/raw/main/eng.traineddata" `
            -OutFile "$tessdata\eng.traineddata"

      - name: Compilar el ejecutable (.exe)
        shell: pwsh
        run: |
          pyinstaller --noconfirm --onefile --windowed `
            --name "ProcesadorTopografico" `
            --add-data "tesseract;tesseract" `
            --hidden-import "matplotlib.backends.backend_tkagg" `
            --hidden-import "openpyxl" `
            desktop_app.py

      - name: Publicar en Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: "Procesador Topográfico (offline) — ${{ github.event.inputs.tag || github.ref_name }}"
          files: dist/ProcesadorTopografico.exe
          body: |
            ## Versión de escritorio (funciona sin internet)

            1. Descarga **ProcesadorTopografico.exe** (abajo, en *Assets*).
            2. Ábrelo con doble clic. Si Windows muestra un aviso de SmartScreen,
               pulsa **"Más información" → "Ejecutar de todas formas"** (es normal
               en programas sin firma de pago).
            3. Pulsa **📂 Abrir imágenes…**, selecciona tus capturas y listo.

            El reconocimiento (OCR) en español ya va incluido: **no necesitas
            instalar nada más ni tener conexión**. Puedes exportar a Excel/CSV y
            ver los puntos en un gráfico Este/Norte, todo sin internet.
